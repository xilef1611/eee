version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webshop-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./backend/database:/app/database
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env
    networks:
      - webshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webshop-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - webshop-network

networks:
  webshop-network:
    driver: bridge

volumes:
  database:
  uploads:
